<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>西安地铁出行小助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ==================== 首页：查询 ==================== -->
    <div class="page active" id="pageHome">
        <header class="top-bar">
            <h1 class="headline">🚇 地铁出行</h1>
            <p class="subhead">Material 3 Expressive</p>
        </header>

        <div class="m3-card">
            <div class="station-row">
                <span class="station-icon">🚩</span>
                <select id="startStation" class="m3-select">
                    <option value="">选择起点站</option>
                </select>
            </div>

            <button class="m3-btn m3-btn-tonal" onclick="swapStations()">⇅ 交换起终点</button>

            <div class="station-row">
                <span class="station-icon">🏁</span>
                <select id="endStation" class="m3-select">
                    <option value="">选择终点站</option>
                </select>
            </div>

            <div class="chip-row">
                <label class="m3-chip"><input type="radio" name="mode" value="auto" checked><span>推荐</span></label>
                <label class="m3-chip"><input type="radio" name="mode" value="time"><span>最短时间</span></label>
                <label class="m3-chip"><input type="radio" name="mode" value="transfer"><span>最少换乘</span></label>
            </div>

            <button class="m3-btn m3-btn-filled" onclick="queryRoute()">🔍 查询路线</button>
            <button class="m3-btn m3-btn-outlined" onclick="resetQuery()">🔄 重置</button>
        </div>

        <div class="m3-card" id="resultCard">
            <h3 class="card-title">📋 查询结果</h3>
            <div id="resultContent">
                <p class="placeholder">💡 选择起点和终点后点击查询</p>
            </div>
        </div>
    </div>

    <!-- ==================== 线路图页面 ==================== -->
    <div class="page" id="pageMap">
        <header class="top-bar" style="display:flex;align-items:center;justify-content:space-between;">
            <button class="icon-btn" onclick="goToPage('pageHome')" style="position:static;">←</button>
            <h1 class="headline" style="flex:1;text-align:center;">🗺️ 线路图</h1>
            <div style="width:48px;"></div>
        </header>
        <div class="m3-card">
            <p class="map-tip">点击站点设起点，再点设终点</p>
            <div id="mapCanvas"></div>
        </div>
    </div>

    <!-- ==================== 收藏页面 ==================== -->
    <div class="page" id="pageFav">
        <header class="top-bar" style="display:flex;align-items:center;justify-content:space-between;">
            <button class="icon-btn" onclick="goToPage('pageHome')" style="position:static;">←</button>
            <h1 class="headline" style="flex:1;text-align:center;">⭐ 收藏</h1>
            <div style="width:48px;"></div>
        </header>
        <div class="m3-card">
            <div id="favContent"><p class="placeholder">暂无收藏路线</p></div>
        </div>
    </div>

    <!-- ==================== 历史页面 ==================== -->
    <div class="page" id="pageHistory">
        <header class="top-bar" style="display:flex;align-items:center;justify-content:space-between;">
            <button class="icon-btn" onclick="goToPage('pageHome')" style="position:static;">←</button>
            <h1 class="headline" style="flex:1;text-align:center;">🕐 历史</h1>
            <div style="width:48px;"></div>
        </header>
        <div class="m3-card">
            <div id="historyContent"><p class="placeholder">暂无历史记录</p></div>
            <button class="m3-btn m3-btn-outlined" onclick="clearHistory()" style="margin-top:12px;">🗑️ 清空历史</button>
        </div>
    </div>

    <!-- ==================== 底部导航 ==================== -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="goToPage('pageHome')"><span class="nav-icon">🔍</span><span>查询</span></button>
        <button class="nav-item" onclick="goToPage('pageMap')"><span class="nav-icon">🗺️</span><span>线路图</span></button>
        <button class="nav-item" onclick="goToPage('pageFav')"><span class="nav-icon">⭐</span><span>收藏</span></button>
        <button class="nav-item" onclick="goToPage('pageHistory')"><span class="nav-icon">🕐</span><span>历史</span></button>
    </nav>

    <!-- ==================== 弹窗 ==================== -->
    <div class="modal" id="modalDetail">
        <div class="modal-content">
            <div class="modal-handle"></div>
            <div id="modalDetailContent"></div>
            <button class="m3-btn m3-btn-filled" onclick="closeModal('modalDetail')">关闭</button>
        </div>
    </div>

    <script src="metro_data.js"></script>
    <script src="metro_ui.js"></script>
</body>
</html>
